<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to 25</title>
<script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f1117;
    color: #e4e6ed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .loading { text-align: center; }
  .loading h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .loading p { color: #8b90a0; font-size: 0.85rem; margin-top: 0.5rem; }
  .error { text-align: center; color: #ff6b6b; max-width: 500px; padding: 2rem; }
  .error h2 { margin-bottom: 0.5rem; }
  .error p { color: #8b90a0; font-size: 0.85rem; margin-top: 0.5rem; }
  .error code { background: #1a1d27; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; color: #ffa94d; }
  .picker { text-align: center; max-width: 500px; padding: 2rem; }
  .picker h1 { font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; color: #fff; }
  .picker .sub { color: #8b90a0; margin-bottom: 2rem; }
  .cards { display: grid; gap: 1rem; }
  .cards a {
    display: block;
    background: linear-gradient(145deg, #1a1d27, #242836);
    border: 1px solid #2e3344;
    border-radius: 14px;
    padding: 1.5rem;
    text-decoration: none;
    color: #e4e6ed;
    font-weight: 700;
    font-size: 1.1rem;
    transition: all 0.2s;
    cursor: pointer;
  }
  .cards a:hover {
    transform: translateY(-2px);
    border-color: rgba(108, 92, 231, 0.4);
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.15);
  }
</style>
</head>
<body>

<div id="loading" class="loading">
  <h2>Loading your coaching report...</h2>
  <p id="loading-status">Identifying your account...</p>
</div>

<div id="error" class="error" style="display:none;">
  <h2>Unable to load</h2>
  <p id="error-msg"></p>
</div>

<div id="picker" class="picker" style="display:none;">
  <h1>Road to 25</h1>
  <div class="sub">Weekly Coaching Reports</div>
  <div class="cards" id="picker-cards"></div>
</div>


<script>
const AGENTS = {
  'haileywalker@carsonvalley.onmicrosoft.com': { name: 'Hailey Walker', file: 'Hailey_Road_to_25.html' },
  'alezfelix@carsonvalley.onmicrosoft.com':    { name: 'Alez Felix',    file: 'Alez_Road_to_25.html' },
  'jonathansanchez@carsonvalley.onmicrosoft.com': { name: 'Jonathan Sanchez', file: 'Jonathan_Road_to_25.html' },
};

const MANAGERS = [
  'joeyrobertson@carsonvalley.onmicrosoft.com',
  'jrobertson2@allstate.com',
  'jamesryan@carsonvalley.onmicrosoft.com',
];

function showReport(file) {
  // Navigate directly to the report instead of using an iframe
  window.location.href = './' + file;
}

function showPicker(agents) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  const picker = document.getElementById('picker');
  const cards = document.getElementById('picker-cards');
  cards.innerHTML = '';
  agents.forEach(a => {
    const link = document.createElement('a');
    link.textContent = a.name;
    link.href = './' + a.file;
    cards.appendChild(link);
  });
  picker.style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').innerHTML = msg;
  document.getElementById('error').style.display = 'block';
}

function setStatus(msg) {
  document.getElementById('loading-status').textContent = msg;
}

function identifyUser(email) {
  const lower = email.toLowerCase().trim();
  const isManager = MANAGERS.some(m => lower === m || lower.includes(m.split('@')[0]));
  const agentInfo = Object.entries(AGENTS).find(([key]) => lower === key || lower.includes(key.split('@')[0]));

  if (isManager) {
    showPicker(Object.values(AGENTS));
  } else if (agentInfo) {
    showReport(agentInfo[1].file);
  } else {
    showError(
      'No coaching report found for your account.<br>' +
      'Detected: <code>' + email + '</code><br><br>' +
      'Contact your manager if you think this is an error.'
    );
  }
}

async function init() {
  // Try Teams SDK first
  try {
    setStatus('Connecting to Teams...');
    await microsoftTeams.app.initialize();
    setStatus('Getting your identity...');
    const context = await microsoftTeams.app.getContext();

    const email = context.user?.loginHint
      || context.user?.userPrincipalName
      || context.user?.id
      || '';

    if (email) {
      setStatus('Found: ' + email);
      identifyUser(email);
      return;
    }

    // Try getting email through authentication
    setStatus('Trying authentication...');
    try {
      const token = await microsoftTeams.authentication.getAuthToken();
      // Decode JWT to get email
      const payload = JSON.parse(atob(token.split('.')[1]));
      const tokenEmail = payload.preferred_username || payload.upn || payload.email || '';
      if (tokenEmail) {
        identifyUser(tokenEmail);
        return;
      }
    } catch (authErr) {
      // Auth token not available
    }

    showError(
      'Could not determine your identity from Teams.<br>' +
      'Context: <code>' + JSON.stringify(context.user || {}) + '</code>'
    );
  } catch (teamsErr) {
    // Not in Teams — check URL params or show picker for testing
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    if (email) {
      identifyUser(email);
    } else {
      // Outside Teams — show all as fallback for browser testing
      showPicker(Object.values(AGENTS));
    }
  }
}

init();
</script>
</body>
</html>
